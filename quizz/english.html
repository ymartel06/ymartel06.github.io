<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>English Exercise - To Be / To Have</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 40px;
            line-height: 2;
        }
        h1 {
            text-align: center;
        }
        h2 {
            text-align: center;
            font-size: 18px;
            font-weight: normal;
            color: #555;
        }
        .controls {
            text-align: center;
            margin-bottom: 20px;
        }
        .controls label {
            font-weight: bold;
            font-size: 16px;
            margin-right: 8px;
        }
        select {
            padding: 6px 12px;
            font-size: 16px;
            border: 1px solid #ccc;
            border-radius: 4px;
            cursor: pointer;
        }
        .instructions {
            margin-bottom: 20px;
            font-weight: bold;
            background-color: #fff8dc;
            padding: 10px 16px;
            border-left: 4px solid #f0c040;
            border-radius: 4px;
        }
        .sentence {
            margin-bottom: 12px;
        }
        input {
            width: 120px;
            padding: 4px;
            font-size: 14px;
            text-align: center;
        }
        .button-container {
            text-align: center;
            margin: 30px 0;
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        button {
            padding: 10px 30px;
            font-size: 16px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        #checkBtn {
            background-color: #4CAF50;
        }
        #checkBtn:hover {
            background-color: #45a049;
        }
        #newBtn {
            background-color: #2196F3;
        }
        #newBtn:hover {
            background-color: #1976D2;
        }
        #score {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            margin-top: 20px;
            padding: 15px;
            display: none;
            background-color: #f0f0f0;
            border-radius: 4px;
        }
        .correct {
            background-color: #90EE90;
        }
        .incorrect {
            background-color: #FFB6C6;
        }
    </style>
</head>
<body>

    <h1>English Exercise</h1>
    <h2>Write the correct form of "to be" or "to have".</h2>

    <div class="controls">
        <label for="tenseSelect">Tense:</label>
        <select id="tenseSelect" onchange="initializePage()">
            <option value="present">Present</option>
            <option value="past">Past</option>
            <option value="future">Future</option>
        </select>
        &nbsp;&nbsp;
        <label for="formSelect">Form:</label>
        <select id="formSelect" onchange="initializePage()">
            <option value="positive">Positive</option>
            <option value="negative">Negative</option>
        </select>
    </div>

    <div class="instructions" id="instructions"></div>

    <form id="exerciseForm"></form>

    <div class="button-container">
        <button type="button" id="checkBtn" onclick="checkAnswers()">Check Answers</button>
        <button type="button" id="newBtn" onclick="initializePage()">New Exercise</button>
    </div>

    <div id="score"></div>

    <script>
        const allSentences = {
            present: [
                { text: "I ___ very happy today.",                   answer: "am",             form: "positive" },
                { text: "She ___ two brothers.",                      answer: "has",            form: "positive" },
                { text: "We ___ in the same class.",                  answer: "are",            form: "positive" },
                { text: "He ___ a new backpack.",                     answer: "has",            form: "positive" },
                { text: "They ___ late for school.",                  answer: "are",            form: "positive" },
                { text: "My dog ___ big brown eyes.",                 answer: "has",            form: "positive" },
                { text: "It ___ very cold outside.",                  answer: "is",             form: "positive" },
                { text: "You ___ my best friend.",                    answer: "are",            form: "positive" },
                { text: "Emma ___ a lot of homework tonight.",        answer: "has",            form: "positive" },
                { text: "I ___ 11 years old.",                        answer: "am",             form: "positive" },
                { text: "The teachers ___ very kind.",                answer: "are",            form: "positive" },
                { text: "My parents ___ a small car.",                answer: "have",           form: "positive" },
                { text: "Tom ___ sick today.",                        answer: "is",             form: "positive" },
                { text: "We ___ a math test tomorrow.",               answer: "have",           form: "positive" },
                { text: "She ___ very good at soccer.",               answer: "is",             form: "positive" },
                { text: "I ___ tired today.",                         answer: "am not",         form: "negative" },
                { text: "She ___ a sister.",                          answer: "doesn't have",   form: "negative" },
                { text: "They ___ at school today.",                  answer: "aren't",         form: "negative" },
                { text: "He ___ a pet.",                              answer: "doesn't have",   form: "negative" },
                { text: "It ___ sunny today.",                        answer: "isn't",          form: "negative" },
                { text: "We ___ any homework tonight.",               answer: "don't have",     form: "negative" },
                { text: "Tom ___ at school today.",                   answer: "isn't",          form: "negative" },
                { text: "You ___ a bad friend.",                      answer: "aren't",         form: "negative" },
                { text: "I ___ a bicycle.",                           answer: "don't have",     form: "negative" },
                { text: "The cat ___ under the bed right now.",       answer: "isn't",          form: "negative" },
            ],
            past: [
                { text: "I ___ very tired yesterday.",                answer: "was",            form: "positive" },
                { text: "She ___ two cats last year.",                answer: "had",            form: "positive" },
                { text: "We ___ in the same class last year.",        answer: "were",           form: "positive" },
                { text: "He ___ a red bike.",                         answer: "had",            form: "positive" },
                { text: "They ___ late for school yesterday.",        answer: "were",           form: "positive" },
                { text: "It ___ very cold last night.",               answer: "was",            form: "positive" },
                { text: "You ___ my best friend.",                    answer: "were",           form: "positive" },
                { text: "Emma ___ a lot of homework last night.",     answer: "had",            form: "positive" },
                { text: "I ___ 10 years old last year.",              answer: "was",            form: "positive" },
                { text: "The teachers ___ very kind.",                answer: "were",           form: "positive" },
                { text: "My parents ___ a big house.",                answer: "had",            form: "positive" },
                { text: "Tom ___ sick yesterday.",                    answer: "was",            form: "positive" },
                { text: "We ___ a math test last week.",              answer: "had",            form: "positive" },
                { text: "She ___ very good at soccer.",               answer: "was",            form: "positive" },
                { text: "The cat ___ under the table.",               answer: "was",            form: "positive" },
                { text: "I ___ at home yesterday.",                   answer: "wasn't",         form: "negative" },
                { text: "She ___ a sister.",                          answer: "didn't have",    form: "negative" },
                { text: "They ___ at school last Friday.",            answer: "weren't",        form: "negative" },
                { text: "He ___ a pet.",                              answer: "didn't have",    form: "negative" },
                { text: "It ___ sunny yesterday.",                    answer: "wasn't",         form: "negative" },
                { text: "We ___ any homework last night.",            answer: "didn't have",    form: "negative" },
                { text: "Tom ___ at school.",                         answer: "wasn't",         form: "negative" },
                { text: "My friends ___ at the park.",                answer: "weren't",        form: "negative" },
                { text: "I ___ enough time.",                         answer: "didn't have",    form: "negative" },
                { text: "You ___ the right answer.",                  answer: "didn't have",    form: "negative" },
            ],
            future: [
                { text: "I ___ very happy tomorrow.",                 answer: "will be",        form: "positive" },
                { text: "She ___ two brothers soon.",                 answer: "will have",      form: "positive" },
                { text: "We ___ in the same class next year.",        answer: "will be",        form: "positive" },
                { text: "He ___ a new backpack next week.",           answer: "will have",      form: "positive" },
                { text: "They ___ late for school tomorrow.",         answer: "will be",        form: "positive" },
                { text: "It ___ very cold tomorrow.",                 answer: "will be",        form: "positive" },
                { text: "You ___ my best friend forever.",            answer: "will be",        form: "positive" },
                { text: "Emma ___ a lot of homework tonight.",        answer: "will have",      form: "positive" },
                { text: "I ___ 12 years old next year.",              answer: "will be",        form: "positive" },
                { text: "The weather ___ nice tomorrow.",             answer: "will be",        form: "positive" },
                { text: "My parents ___ a new car.",                  answer: "will have",      form: "positive" },
                { text: "We ___ a math test next Friday.",            answer: "will have",      form: "positive" },
                { text: "She ___ very good at soccer one day.",       answer: "will be",        form: "positive" },
                { text: "The cat ___ hungry soon.",                   answer: "will be",        form: "positive" },
                { text: "Tom ___ a big dog one day.",                 answer: "will have",      form: "positive" },
                { text: "I ___ at school tomorrow.",                  answer: "won't be",       form: "negative" },
                { text: "She ___ time for this.",                     answer: "won't have",     form: "negative" },
                { text: "They ___ late.",                             answer: "won't be",       form: "negative" },
                { text: "He ___ enough money.",                       answer: "won't have",     form: "negative" },
                { text: "It ___ sunny tomorrow.",                     answer: "won't be",       form: "negative" },
                { text: "We ___ any homework tonight.",               answer: "won't have",     form: "negative" },
                { text: "Tom ___ at school next Monday.",             answer: "won't be",       form: "negative" },
                { text: "My friends ___ at the park tomorrow.",       answer: "won't be",       form: "negative" },
                { text: "I ___ enough time.",                         answer: "won't have",     form: "negative" },
                { text: "You ___ a bad grade.",                       answer: "won't have",     form: "negative" },
            ],
        };

        const hints = {
            present: { positive: "am / is / are / have / has", negative: "am not / isn't / aren't / don't have / doesn't have" },
            past:    { positive: "was / were / had",           negative: "wasn't / weren't / didn't have" },
            future:  { positive: "will be / will have",        negative: "won't be / won't have" },
        };

        function shuffleArray(array) {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        }

        function initializePage() {
            const tense     = document.getElementById('tenseSelect').value;
            const formType  = document.getElementById('formSelect').value;

            // Update instructions
            document.getElementById('instructions').textContent =
                'Fill in the blanks with: ' + hints[tense][formType];

            // Pick 10 random sentences for this tense + form
            const pool = allSentences[tense].filter(s => s.form === formType);
            const selected = shuffleArray(pool).slice(0, 10);

            // Render sentences
            const form = document.getElementById('exerciseForm');
            form.innerHTML = '';
            selected.forEach((s, i) => {
                const parts = s.text.split('___');
                const div = document.createElement('div');
                div.className = 'sentence';
                div.dataset.answer = s.answer;

                const input = document.createElement('input');
                input.type = 'text';
                input.id = 'ans' + (i + 1);
                input.autocomplete = 'off';

                div.appendChild(document.createTextNode((i + 1) + '. ' + parts[0]));
                div.appendChild(input);
                div.appendChild(document.createTextNode(parts[1] || ''));
                form.appendChild(div);
            });

            // Reset score
            const scoreDisplay = document.getElementById('score');
            scoreDisplay.style.display = 'none';
            scoreDisplay.textContent = '';
        }

        function checkAnswers() {
            const form = document.getElementById('exerciseForm');
            const sentences = form.querySelectorAll('.sentence');
            let score = 0;

            sentences.forEach((sentence) => {
                const input = sentence.querySelector('input');
                const userAnswer = input.value.trim().toLowerCase();
                const correctAnswer = sentence.dataset.answer;

                if (userAnswer === correctAnswer) {
                    input.classList.remove('incorrect');
                    input.classList.add('correct');
                    score++;
                } else {
                    input.classList.remove('correct');
                    input.classList.add('incorrect');
                }
            });

            const total = sentences.length;
            const percentage = Math.round((score / total) * 100);
            const scoreDisplay = document.getElementById('score');
            scoreDisplay.textContent = `Score: ${score}/${total} (${percentage}%)`;
            scoreDisplay.style.display = 'block';
        }

        window.addEventListener('load', initializePage);
    </script>

</body>
</html>
